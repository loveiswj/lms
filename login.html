<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — AUD Academy</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 40px 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(44,62,107,0.08);
    }
    .auth-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }
    .auth-logo img { height: 36px; width: auto; }
    .auth-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-desc {
      font-size: 14px;
      color: var(--text-sub);
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: var(--font);
      color: var(--text-primary);
      background: #fff;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--navy);
    }
    .form-input.error { border-color: #EF4444; }
    .form-error {
      font-size: 12px;
      color: #EF4444;
      margin-top: 4px;
      display: none;
    }
    .form-error.show { display: block; }
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .form-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-sub);
      cursor: pointer;
    }
    .form-check input { accent-color: var(--navy); }
    .form-forgot {
      font-size: 13px;
      color: var(--navy-light);
      text-decoration: none;
    }
    .form-forgot:hover { text-decoration: underline; }
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 16px;
    }
    .btn-auth:hover { background: var(--navy-dark); }
    .btn-auth:disabled { background: var(--text-hint); cursor: not-allowed; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider span { font-size: 12px; color: var(--text-hint); }
    .btn-social {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 10px;
    }
    .btn-social:hover { background: var(--bg); border-color: var(--navy-light); }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-sub);
    }
    .auth-footer a {
      color: var(--navy);
      font-weight: 700;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A2E;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html">
          <img src="assets/images/bimatrix_logo.png" alt="BI MATRIX">
        </a>
      </div>

      <h1 class="auth-title">로그인</h1>
      <p class="auth-desc">AUD Academy에 오신 것을 환영합니다</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input type="email" id="email" class="form-input" placeholder="이메일 주소를 입력하세요" autocomplete="email">
          <div class="form-error" id="emailError">올바른 이메일 주소를 입력해주세요</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
          <div class="form-error" id="passwordError">비밀번호를 입력해주세요</div>
        </div>

        <div class="form-options">
          <label class="form-check">
            <input type="checkbox" id="remember"> 로그인 상태 유지
          </label>
          <a href="#" class="form-forgot" onclick="forgotPassword(event)">비밀번호 찾기</a>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">로그인</button>
      </form>

      <div class="auth-divider"><span>또는</span></div>

      <button class="btn-social" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 로그인
      </button>

      <div class="auth-footer">
        아직 회원이 아니신가요? <a href="signup.html">회원가입</a>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/supabase-client.js"></script>
  <script>
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    /* 이미 로그인된 경우 마이페이지로 이동 */
    _supabase.auth.getSession().then(function(res) {
      if (res.data.session) window.location.href = 'mypage.html';
    });

    /* 이메일/비밀번호 로그인 */
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email    = document.getElementById('email');
      var password = document.getElementById('password');
      var valid    = true;

      if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
        email.classList.add('error');
        document.getElementById('emailError').classList.add('show');
        valid = false;
      } else {
        email.classList.remove('error');
        document.getElementById('emailError').classList.remove('show');
      }

      if (!password.value) {
        password.classList.add('error');
        document.getElementById('passwordError').classList.add('show');
        valid = false;
      } else {
        password.classList.remove('error');
        document.getElementById('passwordError').classList.remove('show');
      }

      if (!valid) return;

      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '로그인 중...';

      var remember = document.getElementById('remember').checked;

      var { data, error } = await _supabase.auth.signInWithPassword({
        email: email.value,
        password: password.value
      });

      if (error) {
        showToast('이메일 또는 비밀번호가 올바르지 않습니다');
        btn.disabled = false;
        btn.textContent = '로그인';
      } else {
        window.location.href = 'mypage.html';
      }
    });

    /* 비밀번호 찾기 */
    async function forgotPassword(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        showToast('이메일을 먼저 입력해주세요');
        document.getElementById('email').focus();
        return;
      }
      var { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/lms/reset-password.html'
      });
      if (error) {
        showToast('오류가 발생했습니다. 다시 시도해주세요');
      } else {
        showToast('비밀번호 재설정 메일을 발송했습니다');
      }
    }

    /* Google 로그인 */
    async function loginWithGoogle() {
      await _supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/mypage.html' }
      });
    }
  </script>
</body>
</html>
