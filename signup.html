<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — AUD Academy</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 40px 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(44,62,107,0.08);
    }
    .auth-logo { display: flex; justify-content: center; margin-bottom: 32px; }
    .auth-logo img { height: 36px; width: auto; }
    .auth-title { font-size: 22px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .auth-desc { font-size: 14px; color: var(--text-sub); text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .form-label span { color: #EF4444; margin-left: 2px; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: var(--font);
      color: var(--text-primary);
      background: #fff;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-input:focus { outline: none; border-color: var(--navy); }
    .form-input.error { border-color: #EF4444; }
    .form-error { font-size: 12px; color: #EF4444; margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .form-hint { font-size: 12px; color: var(--text-hint); margin-top: 4px; }
    .pw-strength {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 8px;
      overflow: hidden;
    }
    .pw-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .agree-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
    }
    .agree-all {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .agree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-sub);
      cursor: pointer;
      margin-bottom: 8px;
    }
    .agree-item:last-child { margin-bottom: 0; }
    .agree-item input, .agree-all input { accent-color: var(--navy); width: 15px; height: 15px; flex-shrink: 0; }
    .agree-link { margin-left: auto; font-size: 12px; color: var(--navy-light); text-decoration: none; }
    .agree-link:hover { text-decoration: underline; }
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 16px;
    }
    .btn-auth:hover { background: var(--navy-dark); }
    .btn-auth:disabled { background: var(--text-hint); cursor: not-allowed; }
    .auth-footer { text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-sub); }
    .auth-footer a { color: var(--navy); font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A2E; color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; opacity: 0; transition: all 0.3s;
      z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html">
          <img src="assets/images/bimatrix_logo.png" alt="BI MATRIX">
        </a>
      </div>

      <h1 class="auth-title">회원가입</h1>
      <p class="auth-desc">무료로 가입하고 실무 BI 교육을 시작하세요</p>

      <form id="signupForm" novalidate>

        <div class="form-row">
          <div>
            <label class="form-label" for="name">이름 <span>*</span></label>
            <input type="text" id="name" class="form-input" placeholder="홍길동">
            <div class="form-error" id="nameError">이름을 입력해주세요</div>
          </div>
          <div>
            <label class="form-label" for="phone">연락처</label>
            <input type="tel" id="phone" class="form-input" placeholder="010-0000-0000">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">이메일 <span>*</span></label>
          <input type="email" id="email" class="form-input" placeholder="이메일 주소를 입력하세요">
          <div class="form-error" id="emailError">올바른 이메일 주소를 입력해주세요</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호 <span>*</span></label>
          <input type="password" id="password" class="form-input" placeholder="8자 이상 입력하세요" oninput="checkPwStrength(this.value)">
          <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
          <div class="form-hint" id="pwHint">영문·숫자 조합 8자 이상</div>
          <div class="form-error" id="passwordError">비밀번호를 8자 이상 입력해주세요</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="passwordConfirm">비밀번호 확인 <span>*</span></label>
          <input type="password" id="passwordConfirm" class="form-input" placeholder="비밀번호를 다시 입력하세요">
          <div class="form-error" id="passwordConfirmError">비밀번호가 일치하지 않습니다</div>
        </div>

        <div class="agree-box">
          <label class="agree-all">
            <input type="checkbox" id="agreeAll" onchange="toggleAll(this)">
            전체 동의
          </label>
          <label class="agree-item">
            <input type="checkbox" class="agree-check" data-required="true" name="agree">
            [필수] 이용약관 동의
            <a href="#" class="agree-link">보기</a>
          </label>
          <label class="agree-item">
            <input type="checkbox" class="agree-check" data-required="true" name="agree">
            [필수] 개인정보 처리방침 동의
            <a href="#" class="agree-link">보기</a>
          </label>
          <label class="agree-item">
            <input type="checkbox" class="agree-check" name="agree">
            [선택] 마케팅 정보 수신 동의
          </label>
        </div>
        <div class="form-error" id="agreeError" style="margin-bottom:12px;">필수 약관에 동의해주세요</div>

        <button type="submit" class="btn-auth" id="signupBtn">회원가입</button>
      </form>

      <div class="auth-footer">
        이미 회원이신가요? <a href="login.html">로그인</a>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/supabase-client.js"></script>
  <script>
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    function toggleAll(el) {
      document.querySelectorAll('.agree-check').forEach(function(c) { c.checked = el.checked; });
      if (el.checked) document.getElementById('agreeError').classList.remove('show');
    }

    document.querySelectorAll('.agree-check').forEach(function(c) {
      c.addEventListener('change', function() {
        var all = document.querySelectorAll('.agree-check');
        var checked = document.querySelectorAll('.agree-check:checked');
        document.getElementById('agreeAll').checked = all.length === checked.length;
        /* 필수 체크박스 모두 체크되면 에러 제거 */
        var allRequired = Array.from(document.querySelectorAll('.agree-check[data-required]'))
          .every(function(c) { return c.checked; });
        if (allRequired) document.getElementById('agreeError').classList.remove('show');
      });
    });

    /* 실시간 에러 클리어 */
    document.getElementById('name').addEventListener('input', function() {
      if (this.value.trim()) { this.classList.remove('error'); document.getElementById('nameError').classList.remove('show'); }
    });
    document.getElementById('email').addEventListener('input', function() {
      if (/\S+@\S+\.\S+/.test(this.value)) { this.classList.remove('error'); document.getElementById('emailError').classList.remove('show'); }
    });
    document.getElementById('password').addEventListener('input', function() {
      if (this.value.length >= 8) { this.classList.remove('error'); document.getElementById('passwordError').classList.remove('show'); }
    });
    document.getElementById('passwordConfirm').addEventListener('input', function() {
      if (this.value === document.getElementById('password').value) { this.classList.remove('error'); document.getElementById('passwordConfirmError').classList.remove('show'); }
    });

    function checkPwStrength(val) {
      var bar = document.getElementById('pwBar');
      var hint = document.getElementById('pwHint');
      var score = 0;
      if (val.length >= 8) score++;
      if (/[A-Za-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      var colors = ['', '#EF4444', '#F59E0B', '#10B981', '#2C3E6B'];
      var labels = ['', '매우 약함', '보통', '강함', '매우 강함'];
      bar.style.width = (score * 25) + '%';
      bar.style.background = colors[score] || '';
      hint.textContent = score > 0 ? labels[score] : '영문·숫자 조합 8자 이상';
    }

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var valid = true;

      var name = document.getElementById('name');
      if (!name.value.trim()) {
        name.classList.add('error');
        document.getElementById('nameError').classList.add('show');
        valid = false;
      } else {
        name.classList.remove('error');
        document.getElementById('nameError').classList.remove('show');
      }

      var email = document.getElementById('email');
      if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
        email.classList.add('error');
        document.getElementById('emailError').classList.add('show');
        valid = false;
      } else {
        email.classList.remove('error');
        document.getElementById('emailError').classList.remove('show');
      }

      var pw = document.getElementById('password');
      if (pw.value.length < 8) {
        pw.classList.add('error');
        document.getElementById('passwordError').classList.add('show');
        valid = false;
      } else {
        pw.classList.remove('error');
        document.getElementById('passwordError').classList.remove('show');
      }

      var pwc = document.getElementById('passwordConfirm');
      if (pw.value !== pwc.value) {
        pwc.classList.add('error');
        document.getElementById('passwordConfirmError').classList.add('show');
        valid = false;
      } else {
        pwc.classList.remove('error');
        document.getElementById('passwordConfirmError').classList.remove('show');
      }

      var allRequired = Array.from(document.querySelectorAll('.agree-check[data-required]'))
        .every(function(c) { return c.checked; });
      if (!allRequired) {
        document.getElementById('agreeError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('agreeError').classList.remove('show');
      }

      if (!valid) return;

      var btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = '가입 중...';

      var { data, error } = await _supabase.auth.signUp({
        email: email.value,
        password: pw.value,
        options: { data: { name: name.value.trim() } }
      });

      if (error) {
        showToast(error.message === 'User already registered'
          ? '이미 가입된 이메일입니다' : '가입 중 오류가 발생했습니다');
        btn.disabled = false;
        btn.textContent = '회원가입';
        return;
      }

      /* phone 업데이트 */
      if (document.getElementById('phone').value && data.user) {
        await _supabase.from('profiles')
          .update({ phone: document.getElementById('phone').value })
          .eq('id', data.user.id);
      }

      showToast('가입 완료! 로그인 페이지로 이동합니다');
      setTimeout(function() { window.location.href = 'login.html'; }, 1500);
    });
  </script>
</body>
</html>
