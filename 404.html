<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 — AUD Academy</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: var(--font);
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
    }
    .code {
      font-size: 96px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.12;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: var(--text-sub);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .btn-home {
      display: inline-block;
      padding: 12px 32px;
      background: var(--navy);
      color: #fff;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      margin-right: 8px;
      transition: background 0.2s;
    }
    .btn-home:hover { background: var(--navy-dark); }
    .btn-back {
      display: inline-block;
      padding: 12px 32px;
      background: #fff;
      color: var(--navy);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-back:hover { background: var(--bg); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>주소를 다시 확인해주세요.</p>
    <a href="/lms/" class="btn-home">홈으로 가기</a>
    <a href="javascript:history.back()" class="btn-back">이전 페이지</a>
  </div>
</body>
</html>
