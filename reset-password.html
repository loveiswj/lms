<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — AUD Academy</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 40px 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(44,62,107,0.08);
    }
    .auth-logo { display: flex; justify-content: center; margin-bottom: 32px; }
    .auth-logo img { height: 36px; }
    .auth-title { font-size: 22px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .auth-desc { font-size: 14px; color: var(--text-sub); text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px; font-family: var(--font);
      color: var(--text-primary); background: #fff;
      transition: border-color 0.2s; box-sizing: border-box;
    }
    .form-input:focus { outline: none; border-color: var(--navy); }
    .form-input.error { border-color: #EF4444; }
    .form-error { font-size: 12px; color: #EF4444; margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .pw-strength { height: 4px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .pw-strength-bar { height: 100%; border-radius: 2px; width: 0%; transition: width 0.3s, background 0.3s; }
    .form-hint { font-size: 12px; color: var(--text-hint); margin-top: 4px; }
    .btn-auth {
      width: 100%; padding: 14px;
      background: var(--navy); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-size: 16px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      transition: background 0.2s;
    }
    .btn-auth:hover { background: var(--navy-dark); }
    .btn-auth:disabled { background: var(--text-hint); cursor: not-allowed; }
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A2E; color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; opacity: 0; transition: all 0.3s;
      z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .invalid-wrap {
      text-align: center; padding: 40px 20px;
    }
    .invalid-wrap p { color: var(--text-sub); font-size: 15px; margin-bottom: 20px; }
    .invalid-wrap a {
      display: inline-block; padding: 10px 24px;
      background: var(--navy); color: #fff;
      border-radius: var(--radius-md); font-size: 14px;
      font-weight: 700; text-decoration: none;
    }
    @media (max-width: 480px) { .auth-card { padding: 32px 20px; } }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html">
          <img src="assets/images/bimatrix_logo.png" alt="BI MATRIX">
        </a>
      </div>

      <!-- 유효한 토큰이 있을 때 -->
      <div id="resetForm">
        <h1 class="auth-title">새 비밀번호 설정</h1>
        <p class="auth-desc">새로운 비밀번호를 입력해주세요</p>

        <div class="form-group">
          <label class="form-label">새 비밀번호</label>
          <input type="password" id="newPw" class="form-input" placeholder="8자 이상 입력하세요" oninput="checkStrength(this.value)">
          <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
          <div class="form-hint" id="pwHint">영문·숫자 조합 8자 이상</div>
          <div class="form-error" id="pwError">비밀번호를 8자 이상 입력해주세요</div>
        </div>

        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <input type="password" id="confirmPw" class="form-input" placeholder="비밀번호를 다시 입력하세요">
          <div class="form-error" id="confirmError">비밀번호가 일치하지 않습니다</div>
        </div>

        <button class="btn-auth" id="resetBtn" onclick="doReset()">비밀번호 변경</button>
      </div>

      <!-- 토큰 없거나 만료됐을 때 -->
      <div id="invalidWrap" class="invalid-wrap" style="display:none;">
        <svg width="48" height="48" fill="none" stroke="#EF4444" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:16px;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>링크가 만료되었거나 유효하지 않습니다.<br>비밀번호 찾기를 다시 시도해주세요.</p>
        <a href="login.html">로그인으로 돌아가기</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/supabase-client.js"></script>
  <script>
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    function checkStrength(val) {
      var bar = document.getElementById('pwBar');
      var hint = document.getElementById('pwHint');
      var score = 0;
      if (val.length >= 8) score++;
      if (/[A-Za-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      var colors = ['', '#EF4444', '#F59E0B', '#10B981', '#2C3E6B'];
      var labels = ['', '매우 약함', '보통', '강함', '매우 강함'];
      bar.style.width = (score * 25) + '%';
      bar.style.background = colors[score] || '';
      hint.textContent = score > 0 ? labels[score] : '영문·숫자 조합 8자 이상';
    }

    /* Supabase가 hash fragment로 access_token 전달 */
    async function init() {
      var { data: { session }, error } = await _supabase.auth.getSession();

      /* hash에서 토큰 파싱 (이메일 링크 클릭 시) */
      if (!session) {
        var hash = window.location.hash.substring(1);
        var params = new URLSearchParams(hash);
        var accessToken  = params.get('access_token');
        var refreshToken = params.get('refresh_token');

        if (accessToken) {
          var { error: setErr } = await _supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if (setErr) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('invalidWrap').style.display = 'block';
          }
        } else {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('invalidWrap').style.display = 'block';
        }
      }
    }

    async function doReset() {
      var pw  = document.getElementById('newPw');
      var cpw = document.getElementById('confirmPw');
      var valid = true;

      if (pw.value.length < 8) {
        pw.classList.add('error');
        document.getElementById('pwError').classList.add('show');
        valid = false;
      } else {
        pw.classList.remove('error');
        document.getElementById('pwError').classList.remove('show');
      }

      if (pw.value !== cpw.value) {
        cpw.classList.add('error');
        document.getElementById('confirmError').classList.add('show');
        valid = false;
      } else {
        cpw.classList.remove('error');
        document.getElementById('confirmError').classList.remove('show');
      }

      if (!valid) return;

      var btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = '변경 중...';

      var { error } = await _supabase.auth.updateUser({ password: pw.value });

      if (error) {
        showToast('오류가 발생했습니다. 다시 시도해주세요');
        btn.disabled = false;
        btn.textContent = '비밀번호 변경';
      } else {
        showToast('비밀번호가 변경되었습니다! 로그인 페이지로 이동합니다');
        setTimeout(function() { window.location.href = 'login.html'; }, 2000);
      }
    }

    init();
  </script>
</body>
</html>
